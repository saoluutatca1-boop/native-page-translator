<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dịch PDF — Native Page Translator</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0d1017;
      --panel: rgba(255, 255, 255, 0.045);
      --hairline: rgba(255, 255, 255, 0.09);
      --text: #eceef2;
      --dim: #9aa1ad;
      --faint: #6d7480;
      --accent: #6366f1;
      --accent-2: #3b82f6;
      --danger: #f87171;
      --warn: #fbbf24;
    }
    body {
      margin: 0;
      color: var(--text);
      font: 14px/1.6 "Be Vietnam Pro", "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(120% 70% at 85% -10%, rgba(99, 102, 241, 0.12), transparent 55%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--hairline);
      background: rgba(13, 16, 23, 0.92);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 760;
      letter-spacing: -0.02em;
      background: linear-gradient(100deg, #fff 30%, #a5b4fc 90%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .disclaimer {
      margin: 4px 0 12px;
      color: var(--dim);
      font-size: 12px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .file-btn, button, select {
      padding: 8px 12px;
      border: 1px solid var(--hairline);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s;
    }
    .file-btn:hover, button:hover, select:hover { background: rgba(255, 255, 255, 0.08); }
    select { cursor: pointer; }
    /* Option list render native nền trắng → ép nền tối đặc, tránh chữ trắng trên nền trắng */
    select option { background: #141821; color: var(--text); }
    .source-name {
      overflow: hidden;
      max-width: 340px;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--faint);
      font-size: 12px;
    }
    .progress {
      height: 5px;
      margin-top: 12px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: 99px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      transition: width 0.3s;
    }
    .progress-text {
      margin: 6px 0 0;
      color: var(--dim);
      font-size: 12px;
      min-height: 18px;
    }
    .banner, .error {
      margin: 14px 20px 0;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12.5px;
    }
    .banner {
      border: 1px solid rgba(251, 191, 36, 0.35);
      background: rgba(251, 191, 36, 0.09);
      color: var(--warn);
    }
    .error {
      border: 1px solid rgba(248, 113, 113, 0.35);
      background: rgba(248, 113, 113, 0.09);
      color: var(--danger);
    }
    .error p { margin: 0 0 8px; }
    .error button { margin-right: 8px; }
    main {
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 10px 20px 60px;
    }
    .page-block { margin-top: 26px; }
    .page-heading {
      margin: 0 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--hairline);
      color: var(--dim);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .para { margin: 0 0 14px; }
    .orig {
      color: var(--faint);
      font-size: 12.5px;
    }
    .trans {
      margin-top: 2px;
      color: var(--text);
    }
    body[data-view="translation"] .orig { display: none; }
    body[data-view="original"] .trans { display: none; }
    .hint {
      margin-top: 40px;
      color: var(--faint);
      text-align: center;
      font-size: 13px;
    }
  </style>
</head>
<body data-view="bilingual">
  <header>
    <h1>Dịch PDF</h1>
    <p class="disclaimer">Bản dịch dạng văn bản — không giữ nguyên layout/font/hình ảnh của PDF gốc.</p>
    <div class="controls">
      <label class="file-btn">Chọn file PDF…<input id="fileInput" type="file" accept="application/pdf,.pdf" hidden></label>
      <span id="sourceName" class="source-name">Chưa có nguồn</span>
      <select id="targetLang" title="Ngôn ngữ đích">
        <option value="vi">Dịch sang Tiếng Việt</option>
        <option value="en">Dịch sang Tiếng Anh</option>
      </select>
      <select id="viewMode" title="Chế độ hiển thị">
        <option value="bilingual">Song ngữ</option>
        <option value="translation">Chỉ bản dịch</option>
        <option value="original">Chỉ gốc</option>
      </select>
    </div>
    <div id="progressWrap" class="progress" hidden><div id="progressFill" class="progress-fill"></div></div>
    <p id="progressText" class="progress-text"></p>
  </header>
  <div id="banner" class="banner" hidden></div>
  <div id="errorBox" class="error" hidden>
    <p id="errorText"></p>
    <button id="btnGrant" type="button" hidden>Cấp quyền truy cập</button>
    <button id="btnOpenSettings" type="button" hidden>Mở trang Cài đặt</button>
  </div>
  <main id="content">
    <p id="emptyHint" class="hint">Chọn một file PDF từ máy, hoặc mở trang này từ nút "Dịch PDF này" trong popup khi đang xem PDF.</p>
  </main>
  <!-- pdf.js 4.x là ESM: không cần <script> riêng cho thư viện,
       pdf-viewer.js import './vendor/pdfjs/pdf.min.mjs' trực tiếp. -->
  <script type="module" src="pdf-viewer.js"></script>
</body>
</html>
