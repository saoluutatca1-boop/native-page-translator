<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Gradient chéo accent của design system -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Nền squircle bo góc 28px (~22% của 128) -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Glyph chữ 文 vẽ bằng nét stroke trắng (font-independent) -->
  <g fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round">
    <path d="M60 24 L64.5 33.5"/>
    <path d="M28 46 H92"/>
    <path d="M60 46 L36 100"/>
    <path d="M60 46 L91 99"/>
  </g>
  <!-- Tia spark 4 cánh góc trên phải -->
  <path fill="#ffffff" d="M97 17 Q99.2 26.8 109 29 Q99.2 31.2 97 41 Q94.8 31.2 85 29 Q94.8 26.8 97 17 Z"/>
