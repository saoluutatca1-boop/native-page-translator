<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Native Page Translator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header class="brand">
      <svg class="brand-logo" width="30" height="30" viewBox="0 0 30 30" aria-hidden="true">
        <defs>
          <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6366f1"/>
            <stop offset="1" stop-color="#3b82f6"/>
          </linearGradient>
        </defs>
        <rect width="30" height="30" rx="7" fill="url(#brandGrad)"/>
        <path d="M9 11.5h9.5m0 0-2.8-2.8m2.8 2.8-2.8 2.8M21 18.5h-9.5m0 0 2.8-2.8m-2.8 2.8 2.8 2.8" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Native Translator</h1>
      <span class="version-pill">v4.1</span>
    </header>
    <p class="sub">Dịch trang và nội dung đang gõ.</p>

    <section>
      <label><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17M12 3.5c2.5 2.3 3.8 5.2 3.8 8.5s-1.3 6.2-3.8 8.5c-2.5-2.3-3.8-5.2-3.8-8.5S9.5 5.8 12 3.5Z"/></svg>Dịch trang hiện tại</label>
      <div class="row three">
        <button data-lang="vi"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17"/></svg>VI</button>
        <button data-lang="en"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3c.7 4.5 2.3 6.1 6.8 6.8-4.5.7-6.1 2.3-6.8 6.8-.7-4.5-2.3-6.1-6.8-6.8C9.7 9.1 11.3 7.5 12 3Z"/><path d="M18.5 15.5c.35 2.2 1.1 3 3.3 3.35-2.2.35-2.95 1.15-3.3 3.35-.35-2.2-1.1-3-3.3-3.35 2.2-.35 2.95-1.15 3.3-3.35Z"/></svg>EN</button>
        <button data-lang="original"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9h9a5 5 0 0 1 0 10h-3"/><path d="M7.5 5.5 4 9l3.5 3.5"/></svg>Gốc</button>
      </div>
      <label class="check"><input id="pageUseProvider" type="checkbox"> Dịch cả trang bằng API riêng (tốn quota DeepL/Gemini)</label>
    </section>

    <section>
      <label for="defaultMode"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3c.7 4.5 2.3 6.1 6.8 6.8-4.5.7-6.1 2.3-6.8 6.8-.7-4.5-2.3-6.1-6.8-6.8C9.7 9.1 11.3 7.5 12 3Z"/><path d="M18.5 15.5c.35 2.2 1.1 3 3.3 3.35-2.2.35-2.95 1.15-3.3 3.35-.35-2.2-1.1-3-3.3-3.35 2.2-.35 2.95-1.15 3.3-3.35Z"/></svg>Nút EN mặc định</label>
      <select id="defaultMode">
        <option value="native">API riêng — tự nhiên (DeepL/Gemini/OpenAI)</option>
        <option value="quick">Free fallback — nhanh</option>
      </select>
      <label for="tone" class="small-label">Phong cách dịch bản địa</label>
      <select id="tone">
        <option value="natural">Tự nhiên — bám văn phong gốc</option>
        <option value="professional">Trang trọng — email, công việc</option>
        <option value="casual">Thân mật — chat, bạn bè</option>
      </select>
      <label class="check"><input id="fallbackQuick" type="checkbox"> Tự dịch miễn phí khi API riêng lỗi</label>
    </section>

    <section>
      <div class="section-title">
        <label><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7.5" cy="12" r="3.2"/><path d="M10.7 12h9.3m-3 0v3m3-3v2"/></svg>API riêng</label>
        <button id="openOptions" class="link-button" type="button">Cài đặt &amp; key</button>
      </div>
      <p id="providerStatus" class="note">Đang tải…</p>
      <div class="row two action-row">
        <button id="testApi"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2 5 13h5l-1 9 8-11h-5l1-9Z"/></svg>Test API</button>
        <button id="openOptions2" class="primary"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h9M17 7h3M4 12h2M10 12h10M4 17h9M17 17h3"/><circle cx="15" cy="7" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="15" cy="17" r="2"/></svg>Quản lý key</button>
      </div>
    </section>

    <p id="status" aria-live="polite"></p>
    <p class="note">Key lưu trong extension — gỡ extension là xoá sạch. Phím tắt: Alt+Shift+E (API riêng), Alt+Shift+G (miễn phí).</p>
  </main>
  <script src="providers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
